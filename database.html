<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Base</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --surface2: #ebebeb;
    --border: #d0d0d0;
    --border-dark: #333;
    --text: #0a0a0a;
    --muted: #666;
    --light: #999;
    --black: #000000;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .top-bar {
    border-bottom: 2px solid var(--black);
    padding: 1.2rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .db-title {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600; font-size: 1.1rem;
    letter-spacing: 3px; text-transform: uppercase;
  }
  .user-bar { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
  .user-chip {
    display: flex; align-items: center; gap: 0.45rem;
    border: 1.5px solid var(--black); border-radius: 2px;
    padding: 0.28rem 0.75rem;
    font-size: 0.72rem; font-weight: 600;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 1px;
    cursor: pointer; background: var(--white); transition: all 0.1s;
  }
  .user-chip .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.4; }
  .user-chip.active-user { background: var(--black); color: var(--white); }
  .user-remove {
    margin-left: 4px; font-size: 0.85rem; line-height: 1;
    opacity: 0.5; transition: opacity 0.1s; cursor: pointer;
  }
  .user-remove:hover { opacity: 1; }
  .add-user-btn {
    border: 1.5px dashed var(--border-dark); border-radius: 2px;
    padding: 0.28rem 0.7rem; font-size: 0.72rem;
    font-family: 'IBM Plex Mono', monospace;
    background: transparent; cursor: pointer; color: var(--muted);
    transition: all 0.1s;
  }
  .add-user-btn:hover { color: var(--black); border-color: var(--black); }

  .tabs {
    display: flex; border-bottom: 1.5px solid var(--border);
    padding: 0 2rem; gap: 0;
  }
  .tab {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
    font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 0.85rem 1.4rem; cursor: pointer;
    border-bottom: 2.5px solid transparent; margin-bottom: -1.5px;
    color: var(--muted); transition: all 0.1s; user-select: none;
  }
  .tab:hover { color: var(--black); }
  .tab.active { color: var(--black); border-bottom-color: var(--black); }

  .page { display: none; padding: 2rem; }
  .page.active { display: block; }

  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.4rem; flex-wrap: wrap; gap: 1rem;
  }
  .section-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
  }
  .count-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
    background: var(--black); color: var(--white);
    padding: 2px 7px; margin-left: 0.6rem;
  }

  .btn {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    font-weight: 600; letter-spacing: 1px;
    padding: 0.48rem 1rem; border: 1.5px solid var(--black);
    border-radius: 2px; cursor: pointer; transition: all 0.1s;
    background: var(--white); color: var(--black);
  }
  .btn:hover { background: var(--black); color: var(--white); }
  .btn-fill { background: var(--black); color: var(--white); }
  .btn-fill:hover { background: #222; }

  .search-row { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
  .search-input {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
    padding: 0.48rem 0.8rem; border: 1.5px solid var(--border);
    border-radius: 2px; outline: none; width: 220px;
    background: var(--white); color: var(--black); transition: border-color 0.1s;
  }
  .search-input:focus { border-color: var(--black); }

  .inline-form {
    display: none; background: var(--surface);
    border: 1.5px solid var(--border-dark); border-radius: 2px;
    padding: 1.2rem 1.4rem; margin-bottom: 1.4rem;
    animation: fadeIn 0.15s ease;
  }
  .inline-form.open { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

  .form-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(175px,1fr));
    gap: 0.7rem; margin-bottom: 1rem;
  }
  .field label {
    display: block; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.28rem;
  }
  .field input, .field select {
    width: 100%; font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem;
    padding: 0.42rem 0.65rem; border: 1.5px solid var(--border);
    border-radius: 2px; background: var(--white); color: var(--black);
    outline: none; transition: border-color 0.1s;
  }
  .field input:focus, .field select:focus { border-color: var(--black); }
  .form-actions { display: flex; gap: 0.55rem; justify-content: flex-end; }

  .table-wrap { border: 1.5px solid var(--border-dark); border-radius: 2px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 700px; }
  thead th {
    text-align: left; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); padding: 0.65rem 0.9rem;
    background: var(--surface); border-bottom: 1.5px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.07s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface); }
  tbody td { padding: 0.7rem 0.9rem; font-size: 0.84rem; vertical-align: middle; }
  .td-name { font-weight: 600; font-size: 0.86rem; }
  .td-sub { color: var(--muted); font-size: 0.76rem; font-family: 'IBM Plex Mono', monospace; }

  .status {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.64rem;
    font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 7px; border: 1.5px solid; border-radius: 2px; white-space: nowrap;
  }
  .s-accepted { border-color:#000;background:#000;color:#fff; }
  .s-declined { border-color:#aaa;background:#fff;color:#aaa;text-decoration:line-through; }
  .s-saved    { border-color:#000;background:#fff;color:#000; }
  .s-pending  { border-color:#ccc;background:#f5f5f5;color:#999; }

  .inv-row { display: flex; gap: 3px; }
  .inv {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    font-weight: 600; padding: 3px 7px; border: 1.5px solid var(--border);
    border-radius: 2px; cursor: pointer; background: var(--white);
    color: var(--muted); transition: all 0.1s;
  }
  .inv:hover { border-color: var(--black); color: var(--black); background: var(--surface); }
  .inv.i-a:hover { background: var(--black); color: var(--white); border-color: var(--black); }

  .del-btn {
    font-size: 0.72rem; background: none; border: none;
    cursor: pointer; color: var(--light); padding: 3px; transition: color 0.1s;
  }
  .del-btn:hover { color: var(--black); }

  /* EVENTS GRID */
  .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px,1fr)); gap: 1.2rem; }
  .event-card {
    border: 1.5px solid var(--border-dark); border-radius: 2px;
    overflow: hidden; background: var(--white);
  }
  .event-card-head {
    padding: 1rem 1.1rem 0.8rem;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
  }
  .event-card-info { flex: 1; }
  .event-card-name {
    font-family: 'IBM Plex Mono', monospace; font-weight: 600;
    font-size: 0.9rem; margin-bottom: 0.25rem;
  }
  .event-card-meta {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    color: var(--muted); letter-spacing: 0.5px; display: flex; gap: 0.75rem; flex-wrap: wrap;
  }
  .event-card-actions { display: flex; gap: 0.35rem; align-items: center; }
  .ev-stage-badge {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: 2px 7px; border: 1.5px solid var(--black); border-radius: 2px;
  }
  .ev-stage-badge.planning  { border-color:#ccc; color:#999; }
  .ev-stage-badge.outreach  { border-color:#555; color:#555; }
  .ev-stage-badge.confirmed { border-color:#000; background:#000; color:#fff; }
  .ev-stage-badge.delivered { border-color:#000; color:#000; }

  /* DEAL MINI PIPELINE inside card */
  .ev-pipe { padding: 0.75rem 1.1rem; }
  .ev-pipe-cols { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; border: 1px solid var(--border); border-radius: 2px; overflow:hidden; }
  .ev-pipe-col { border-right: 1px solid var(--border); }
  .ev-pipe-col:last-child { border-right: none; }
  .ev-pipe-col-head {
    padding: 0.35rem 0.5rem;
    background: var(--surface); border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem;
    font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); display: flex; align-items: center; justify-content: space-between;
  }
  .ev-pipe-col-head span { font-weight: 400; }
  .ev-pipe-deals { padding: 0.4rem; min-height: 40px; display: flex; flex-direction: column; gap: 0.3rem; }
  .ev-deal-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 2px; padding: 0.3rem 0.4rem;
    font-size: 0.72rem; cursor: pointer; transition: all 0.1s;
    display: flex; align-items: center; justify-content: space-between; gap: 4px;
    position: relative;
  }
  .ev-deal-chip:hover { border-color: var(--black); }
  .ev-deal-chip-name { font-weight: 500; font-size: 0.72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex:1; }
  .ev-deal-chip-del { font-size: 0.65rem; color: var(--light); cursor: pointer; flex-shrink:0; }
  .ev-deal-chip-del:hover { color: var(--black); }
  .ev-pipe-empty { font-family:'IBM Plex Mono',monospace; font-size:0.6rem; color:var(--light); text-align:center; padding:0.5rem 0; }
  .ev-add-deal {
    display: flex; align-items: center; justify-content: center;
    padding: 0.4rem; font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; color: var(--muted); cursor: pointer;
    border-top: 1px solid var(--border); transition: all 0.1s;
    letter-spacing: 1px;
  }
  .ev-add-deal:hover { background: var(--surface); color: var(--black); }

  .ev-del-btn {
    font-size: 0.72rem; background: none; border: 1px solid var(--border);
    border-radius: 2px; cursor: pointer; color: var(--light); padding: 3px 6px;
    font-family: 'IBM Plex Mono', monospace; transition: all 0.1s;
  }
  .ev-del-btn:hover { border-color: var(--black); color: var(--black); }
  .ev-adv-btn {
    font-size: 0.65rem; background: none; border: 1px solid var(--border);
    border-radius: 2px; cursor: pointer; color: var(--muted); padding: 3px 7px;
    font-family: 'IBM Plex Mono', monospace; transition: all 0.1s; white-space:nowrap;
  }
  .ev-adv-btn:hover { border-color: var(--black); color: var(--black); }
  .ev-empty-state {
    grid-column: 1/-1; text-align:center; padding: 4rem 2rem;
    font-family:'IBM Plex Mono',monospace; font-size:0.75rem; color:var(--light); letter-spacing:2px;
  }

  /* TASKS */
  .tasks-layout { display: grid; grid-template-columns: 1fr 300px; gap: 2rem; }
  .task-form-box {
    border: 1.5px solid var(--border-dark); border-radius: 2px;
    padding: 1.2rem; background: var(--surface); height: fit-content;
  }
  .task-form-title {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    margin-bottom: 0.9rem;
  }
  .task-input {
    width: 100%; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.86rem;
    padding: 0.5rem 0.7rem; border: 1.5px solid var(--border);
    border-radius: 2px; outline: none; background: var(--white); color: var(--black);
    margin-bottom: 0.55rem; transition: border-color 0.1s;
  }
  .task-input:focus { border-color: var(--black); }
  .prio-row { display: flex; gap: 0.35rem; margin-bottom: 0.7rem; }
  .prio-btn {
    flex: 1; font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem;
    font-weight: 600; letter-spacing: 1px; padding: 0.32rem;
    border: 1.5px solid var(--border); border-radius: 2px;
    cursor: pointer; background: var(--white); color: var(--muted);
    text-transform: uppercase; transition: all 0.1s;
  }
  .prio-btn.selected { border-color: var(--black); background: var(--black); color: var(--white); }

  .task-list { display: flex; flex-direction: column; gap: 0.45rem; }
  .task-item {
    display: flex; align-items: flex-start; gap: 0.7rem;
    padding: 0.8rem 0.9rem; border: 1.5px solid var(--border);
    border-radius: 2px; background: var(--white); transition: border-color 0.1s;
  }
  .task-item:hover { border-color: var(--border-dark); }
  .task-item.done { opacity: 0.4; }
  .task-check {
    width: 15px; height: 15px; min-width: 15px; border: 1.5px solid var(--border-dark);
    border-radius: 2px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; margin-top: 2px; font-size: 0.65rem;
    background: var(--white); transition: all 0.1s;
  }
  .task-check:hover { background: var(--surface2); }
  .task-item.done .task-check { background: var(--black); color: var(--white); border-color: var(--black); }
  .task-body { flex: 1; }
  .task-text { font-size: 0.86rem; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-meta { display: flex; gap: 0.45rem; margin-top: 3px; align-items: center; flex-wrap: wrap; }
  .task-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--light); }
  .prio-tag {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase; padding: 1px 5px;
    border: 1px solid var(--border); border-radius: 2px; color: var(--muted);
  }
  .prio-tag.high { border-color: #000; color: #000; }
  .prio-tag.med  { border-color: #888; color: #888; }
  .task-del {
    background: none; border: none; color: var(--light);
    cursor: pointer; font-size: 0.72rem; padding: 2px;
    opacity: 0; transition: opacity 0.1s;
  }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--black); }

  .empty {
    text-align: center; padding: 3rem 1rem;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    color: var(--light); letter-spacing: 1px;
  }

  .overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.4); align-items: center; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white); border: 2px solid var(--black);
    border-radius: 2px; padding: 1.8rem; width: 340px;
    animation: popIn 0.15s ease;
  }
  @keyframes popIn { from{opacity:0;transform:scale(0.97)} to{opacity:1;transform:scale(1)} }
  .modal h3 {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 1.1rem;
  }
  .modal .field { margin-bottom: 0.65rem; }
  .modal-actions { display: flex; gap: 0.55rem; justify-content: flex-end; margin-top: 1.1rem; }

  .toasts { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; display: flex; flex-direction: column; gap: 0.35rem; }
  .toast {
    background: var(--black); color: var(--white);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; letter-spacing: 0.5px;
    padding: 0.6rem 1rem; border-radius: 2px; animation: fadeIn 0.2s ease;
  }

  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  @media(max-width:900px){ .pipeline{grid-template-columns:repeat(2,1fr);} .tasks-layout{grid-template-columns:1fr;} }
  @media(max-width:600px){ .pipeline{grid-template-columns:1fr;} .top-bar{flex-wrap:wrap;gap:0.6rem;} }
</style>
</head>
<body>

<div class="top-bar">
  <div class="db-title">Data Base</div>
  <div class="user-bar" id="userBar"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('delegates',this)">Delegates</div>
  <div class="tab" onclick="switchTab('pipeline',this)">Events</div>
  <div class="tab" onclick="switchTab('tasks',this)">Tasks</div>
</div>

<!-- DELEGATES -->
<div class="page active" id="tab-delegates">
  <div class="section-head">
    <div><span class="section-label">Delegates</span><span class="count-tag" id="delCount">0</span></div>
    <div class="search-row">
      <input class="search-input" id="delSearch" placeholder="Search…" oninput="renderDelegates()">
      <button class="btn btn-fill" onclick="toggleForm('delForm')">+ Add Delegate</button>
    </div>
  </div>
  <div class="inline-form" id="delForm">
    <div class="form-grid">
      <div class="field"><label>First Name *</label><input id="dFirst" placeholder="John"></div>
      <div class="field"><label>Last Name *</label><input id="dLast" placeholder="Smith"></div>
      <div class="field"><label>Email *</label><input id="dEmail" type="email" placeholder="john@co.com"></div>
      <div class="field"><label>Phone</label><input id="dPhone" placeholder="+1 555 000 0000"></div>
      <div class="field"><label>Company</label><input id="dCompany" placeholder="Acme Corp"></div>
      <div class="field"><label>Job Title</label><input id="dTitle" placeholder="CTO"></div>
      <div class="field"><label>Event</label><input id="dEvent" placeholder="Cloud Summit 2026"></div>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="toggleForm('delForm')">Cancel</button>
      <button class="btn btn-fill" onclick="addDelegate()">Save</button>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>Name</th><th>Email</th><th>Phone</th><th>Company</th>
        <th>Title</th><th>Event</th><th>Status</th><th>Calendar Invite</th><th></th>
      </tr></thead>
      <tbody id="delegateRows"></tbody>
    </table>
    <div id="delEmpty" class="empty" style="display:none">NO DELEGATES YET</div>
  </div>
</div>

<!-- EVENTS -->
<div class="page" id="tab-pipeline">
  <div class="section-head">
    <div><span class="section-label">Events</span><span class="count-tag" id="evCount">0</span></div>
    <button class="btn btn-fill" onclick="openEventModal()">+ New Event</button>
  </div>
  <div id="eventsGrid"></div>
</div>

<!-- EVENT MODAL -->
<div class="overlay" id="eventModal">
  <div class="modal" style="width:420px">
    <h3 id="evModalTitle">New Event</h3>
    <div class="field" style="margin-bottom:0.65rem"><label>Event Name *</label><input id="evName" placeholder="Oslo Tech Summit 2026"></div>
    <div class="field" style="margin-bottom:0.65rem"><label>Region / City *</label><input id="evRegion" placeholder="Oslo, Norway"></div>
    <div class="field" style="margin-bottom:0.65rem"><label>Date</label><input id="evDate" type="date"></div>
    <div class="field" style="margin-bottom:0.65rem"><label>Client / Sponsor</label><input id="evClient" placeholder="Acme Corp"></div>
    <div class="field"><label>Notes</label><input id="evNotes" placeholder="Optional notes"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('eventModal')">Cancel</button>
      <button class="btn btn-fill" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- DEAL MODAL -->
<div class="overlay" id="dealModal">
  <div class="modal">
    <h3>Add Deal</h3>
    <div class="field" style="margin-bottom:0.65rem"><label>Contact / Company *</label><input id="dlName" placeholder="Jane Doe — Acme Corp"></div>
    <div class="field" style="margin-bottom:0.65rem"><label>Value</label><input id="dlValue" placeholder="£5,000"></div>
    <div class="field"><label>Notes</label><input id="dlNotes" placeholder="Optional"></div>
    <input type="hidden" id="dlEventId">
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('dealModal')">Cancel</button>
      <button class="btn btn-fill" onclick="saveDeal()">Add Deal</button>
    </div>
  </div>
</div>

<!-- TASKS -->
<div class="page" id="tab-tasks">
  <div class="tasks-layout">
    <div>
      <div class="section-head">
        <span class="section-label">Daily Tasks<span class="count-tag" id="taskCount">0</span></span>
      </div>
      <div class="task-list" id="taskList"></div>
    </div>
    <div class="task-form-box">
      <div class="task-form-title">New Task</div>
      <input class="task-input" id="taskText" placeholder="Task description…" onkeydown="if(event.key==='Enter')addTask()">
      <input class="task-input" id="taskDue" type="date">
      <div class="prio-row">
        <button class="prio-btn" data-p="low" onclick="selectPrio(this)">Low</button>
        <button class="prio-btn selected" data-p="med" onclick="selectPrio(this)">Med</button>
        <button class="prio-btn" data-p="high" onclick="selectPrio(this)">High</button>
      </div>
      <button class="btn btn-fill" style="width:100%" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- USER MODAL -->
<div class="overlay" id="userModal">
  <div class="modal">
    <h3>Add User</h3>
    <div class="field"><label>Name *</label><input id="newUserName" placeholder="e.g. Maria"></div>
    <div class="field"><label>Role</label><input id="newUserRole" placeholder="e.g. Sales Manager"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-fill" onclick="addUser()">Add</button>
    </div>
  </div>
</div>

<div class="toasts" id="toasts"></div>

<script>
let S = {
  users:[{id:'andrit',name:'Andrit',role:'Delegate Acquisition',active:true}],
  delegates:[],
  deals:[],
  tasks:[],
  prio:'med'
};

function save(){ localStorage.setItem('db3',JSON.stringify(S)); }
function load(){
  const r=localStorage.getItem('db3');
  if(r) try{ S=JSON.parse(r); }catch(e){}
  if(!S.users) S.users=[];
  if(!S.users.find(u=>u.id==='andrit'))
    S.users.unshift({id:'andrit',name:'Andrit',role:'Delegate Acquisition',active:true});
  if(!S.delegates) S.delegates=[];
  if(!S.deals) S.deals=[];
  if(!S.events) S.events=[];
  if(!S.tasks) S.tasks=[];
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function switchTab(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
}

// USERS
function activeUser(){ return S.users.find(u=>u.active)||S.users[0]; }
function renderUsers(){
  const bar=document.getElementById('userBar');
  bar.innerHTML='';
  S.users.forEach(u=>{
    const c=document.createElement('div');
    c.className='user-chip'+(u.active?' active-user':'');
    const removeBtn = u.id!=='andrit'
      ? `<span class="user-remove" onclick="removeUser('${u.id}',event)" title="Remove user">×</span>`
      : '';
    c.innerHTML=`<span class="dot"></span>${u.name.toUpperCase()}${removeBtn}`;
    c.title=u.role||'';
    c.onclick=(e)=>{
      if(e.target.classList.contains('user-remove')) return;
      S.users.forEach(x=>x.active=false); u.active=true; save(); renderUsers(); renderEvents();
    };
    bar.appendChild(c);
  });
  const b=document.createElement('button');
  b.className='add-user-btn'; b.textContent='+ User';
  b.onclick=()=>document.getElementById('userModal').classList.add('open');
  bar.appendChild(b);
}
function removeUser(id, e){
  e.stopPropagation();
  if(!confirm('Remove this user? Their events and deals will also be removed.')) return;
  S.events = S.events.filter(ev=>ev.owner!==id);
  S.deals = S.deals.filter(d=>d.owner!==id);
  S.users = S.users.filter(u=>u.id!==id);
  if(!S.users.find(u=>u.active)) S.users[0].active=true;
  save(); renderUsers(); renderEvents(); toast('User removed');
}
function addUser(){
  const name=document.getElementById('newUserName').value.trim();
  if(!name){toast('Name required');return;}
  S.users.forEach(u=>u.active=false);
  const newId=uid();
  S.users.push({id:newId,name,role:document.getElementById('newUserRole').value.trim(),active:true});
  document.getElementById('newUserName').value='';
  document.getElementById('newUserRole').value='';
  save(); renderUsers(); closeModal('userModal'); toast('User added');
}

// DELEGATES
function renderDelegates(){
  const q=document.getElementById('delSearch').value.toLowerCase();
  let list=S.delegates.filter(d=>!q||`${d.firstName} ${d.lastName} ${d.email} ${d.company} ${d.title} ${d.event}`.toLowerCase().includes(q));
  document.getElementById('delCount').textContent=S.delegates.length;
  document.getElementById('delEmpty').style.display=list.length?'none':'block';
  const tbody=document.getElementById('delegateRows');
  tbody.innerHTML='';
  list.forEach(d=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="td-name">${d.firstName} ${d.lastName}</div></td>
      <td><div class="td-sub">${d.email}</div></td>
      <td><div class="td-sub">${d.phone||'—'}</div></td>
      <td>${d.company||'—'}</td>
      <td style="color:var(--muted);font-size:0.78rem">${d.title||'—'}</td>
      <td style="font-size:0.78rem">${d.event||'—'}</td>
      <td>${sBadge(d.status)}</td>
      <td><div class="inv-row">
        <button class="inv i-a" onclick="setDS('${d.id}','accepted')">✓ Accept</button>
        <button class="inv" onclick="setDS('${d.id}','declined')">✕ Decline</button>
        <button class="inv" onclick="setDS('${d.id}','saved')">📌 Save</button>
      </div></td>
      <td><button class="del-btn" onclick="delD('${d.id}')">✕</button></td>`;
    tbody.appendChild(tr);
  });
}
function sBadge(s){
  const m={accepted:['s-accepted','ACCEPTED'],declined:['s-declined','DECLINED'],saved:['s-saved','SAVED'],pending:['s-pending','PENDING']};
  const[cls,lbl]=m[s]||m.pending;
  return`<span class="status ${cls}">${lbl}</span>`;
}
function toggleForm(id){ document.getElementById(id).classList.toggle('open'); }
function addDelegate(){
  const f=v=>document.getElementById(v).value.trim();
  if(!f('dFirst')||!f('dLast')||!f('dEmail')){toast('First, last name and email required');return;}
  S.delegates.push({id:uid(),firstName:f('dFirst'),lastName:f('dLast'),email:f('dEmail'),phone:f('dPhone'),company:f('dCompany'),title:f('dTitle'),event:f('dEvent'),status:'pending'});
  ['dFirst','dLast','dEmail','dPhone','dCompany','dTitle','dEvent'].forEach(id=>document.getElementById(id).value='');
  save(); renderDelegates(); document.getElementById('delForm').classList.remove('open'); toast('Delegate saved');
}
function setDS(id,status){
  const d=S.delegates.find(x=>x.id===id);
  if(d){d.status=status;save();renderDelegates();toast(status.toUpperCase());}
}
function delD(id){ S.delegates=S.delegates.filter(x=>x.id!==id); save(); renderDelegates(); toast('Removed'); }

// EVENTS
const EV_STAGES = ['planning','outreach','confirmed','delivered'];
const EV_LABELS = {planning:'PLAN',outreach:'OUT',confirmed:'CONF',delivered:'DONE'};
const EV_LABELS_FULL = {planning:'PLANNING',outreach:'OUTREACH',confirmed:'CONFIRMED',delivered:'DELIVERED'};

let editingEventId = null;

function openEventModal(id){
  editingEventId = id||null;
  if(id){
    const ev=S.events.find(e=>e.id===id);
    document.getElementById('evModalTitle').textContent='Edit Event';
    document.getElementById('evName').value=ev.name;
    document.getElementById('evRegion').value=ev.region;
    document.getElementById('evDate').value=ev.date||'';
    document.getElementById('evClient').value=ev.client||'';
    document.getElementById('evNotes').value=ev.notes||'';
  } else {
    document.getElementById('evModalTitle').textContent='New Event';
    ['evName','evRegion','evDate','evClient','evNotes'].forEach(i=>document.getElementById(i).value='');
  }
  document.getElementById('eventModal').classList.add('open');
  setTimeout(()=>document.getElementById('evName').focus(),100);
}

function saveEvent(){
  const f=id=>document.getElementById(id).value.trim();
  if(!f('evName')||!f('evRegion')){toast('Event name and region required');return;}
  const me=activeUser();
  if(editingEventId){
    const ev=S.events.find(e=>e.id===editingEventId);
    ev.name=f('evName'); ev.region=f('evRegion'); ev.date=f('evDate'); ev.client=f('evClient'); ev.notes=f('evNotes');
    toast('Event updated');
  } else {
    S.events.push({id:uid(),owner:me.id,name:f('evName'),region:f('evRegion'),date:f('evDate'),client:f('evClient'),notes:f('evNotes'),stage:'planning'});
    toast('Event created');
  }
  save(); renderEvents(); closeModal('eventModal');
}

function deleteEvent(id){
  if(!confirm('Delete this event and all its deals?')) return;
  S.events=S.events.filter(e=>e.id!==id);
  S.deals=S.deals.filter(d=>d.eventId!==id);
  save(); renderEvents(); toast('Event deleted');
}

function advanceEvent(id,e){
  e.stopPropagation();
  const ev=S.events.find(x=>x.id===id);
  const idx=EV_STAGES.indexOf(ev.stage);
  if(idx<EV_STAGES.length-1){ ev.stage=EV_STAGES[idx+1]; save(); renderEvents(); toast('→ '+EV_LABELS_FULL[ev.stage]); }
  else toast('Already DELIVERED');
}

function openDealModal(eventId){
  document.getElementById('dlEventId').value=eventId;
  ['dlName','dlValue','dlNotes'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('dealModal').classList.add('open');
  setTimeout(()=>document.getElementById('dlName').focus(),100);
}

function saveDeal(){
  const f=id=>document.getElementById(id).value.trim();
  if(!f('dlName')){toast('Contact name required');return;}
  const eventId=document.getElementById('dlEventId').value;
  const me=activeUser();
  S.deals.push({id:uid(),eventId,owner:me.id,name:f('dlName'),value:f('dlValue'),notes:f('dlNotes'),stage:'planning'});
  save(); renderEvents(); closeModal('dealModal'); toast('Deal added');
}

function advanceDeal(dealId, e){
  e.stopPropagation();
  const d=S.deals.find(x=>x.id===dealId);
  const idx=EV_STAGES.indexOf(d.stage);
  if(idx<EV_STAGES.length-1){ d.stage=EV_STAGES[idx+1]; save(); renderEvents(); }
}

function deleteDeal(dealId,e){
  e.stopPropagation();
  S.deals=S.deals.filter(x=>x.id!==dealId);
  save(); renderEvents(); toast('Deal removed');
}

function renderEvents(){
  const me=activeUser();
  const myEvents = me.id==='andrit' ? S.events : S.events.filter(e=>e.owner===me.id);
  document.getElementById('evCount').textContent=myEvents.length;
  const grid=document.getElementById('eventsGrid');
  grid.className='events-grid';
  grid.innerHTML='';

  if(myEvents.length===0){
    grid.innerHTML='<div class="ev-empty-state">NO EVENTS YET — CREATE YOUR FIRST ONE</div>';
    return;
  }

  myEvents.forEach(ev=>{
    const evDeals = S.deals.filter(d=>d.eventId===ev.id);
    const card=document.createElement('div');
    card.className='event-card';

    // header
    const metaParts=[];
    if(ev.region) metaParts.push('📍 '+ev.region);
    if(ev.date) metaParts.push('🗓 '+fmtDate(ev.date));
    if(ev.client) metaParts.push('🏢 '+ev.client);

    card.innerHTML=`
      <div class="event-card-head">
        <div class="event-card-info">
          <div class="event-card-name">${ev.name}</div>
          <div class="event-card-meta">${metaParts.join('&nbsp;&nbsp;')}</div>
        </div>
        <div class="event-card-actions">
          <span class="ev-stage-badge ${ev.stage}">${EV_LABELS_FULL[ev.stage]||ev.stage}</span>
          <button class="ev-adv-btn" onclick="advanceEvent('${ev.id}',event)" title="Advance stage">→</button>
          <button class="ev-del-btn" onclick="deleteEvent('${ev.id}')" title="Delete">✕</button>
        </div>
      </div>
      <div class="ev-pipe">
        <div class="ev-pipe-cols" id="evcols-${ev.id}"></div>
        <div class="ev-add-deal" onclick="openDealModal('${ev.id}')">+ Add Deal</div>
      </div>
    `;
    grid.appendChild(card);

    // render mini pipeline columns
    const colsEl=document.getElementById('evcols-'+ev.id);
    EV_STAGES.forEach(stage=>{
      const stageDeals=evDeals.filter(d=>d.stage===stage);
      const col=document.createElement('div');
      col.className='ev-pipe-col';
      col.innerHTML=`
        <div class="ev-pipe-col-head">${EV_LABELS[stage]} <span>${stageDeals.length||''}</span></div>
        <div class="ev-pipe-deals" id="evd-${ev.id}-${stage}"></div>
      `;
      colsEl.appendChild(col);
      const dealsEl=document.getElementById(`evd-${ev.id}-${stage}`);
      if(stageDeals.length===0){
        dealsEl.innerHTML='<div class="ev-pipe-empty">—</div>';
      } else {
        stageDeals.forEach(d=>{
          const chip=document.createElement('div');
          chip.className='ev-deal-chip';
          chip.title='Click to advance stage';
          chip.innerHTML=`
            <span class="ev-deal-chip-name">${d.name}</span>
            <span class="ev-deal-chip-del" onclick="deleteDeal('${d.id}',event)">✕</span>
          `;
          chip.onclick=(e)=>{
            if(e.target.classList.contains('ev-deal-chip-del')) return;
            advanceDeal(d.id,e);
          };
          dealsEl.appendChild(chip);
        });
      }
    });
  });
}

// TASKS
function selectPrio(btn){
  document.querySelectorAll('.prio-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); S.prio=btn.dataset.p;
}
function renderTasks(){
  const list=document.getElementById('taskList');
  const open=S.tasks.filter(t=>!t.done).length;
  document.getElementById('taskCount').textContent=open;
  const sorted=[...S.tasks].sort((a,b)=>{const p={high:0,med:1,low:2};return(p[a.prio]||1)-(p[b.prio]||1);});
  list.innerHTML='';
  if(sorted.length===0){
    list.innerHTML='<div class="empty" id="taskEmpty">NO TASKS YET</div>';
    return;
  }
  sorted.forEach(t=>{
    const item=document.createElement('div');
    item.className='task-item'+(t.done?' done':'');
    item.innerHTML=`
      <div class="task-check" onclick="toggleT('${t.id}')">${t.done?'✓':''}</div>
      <div class="task-body">
        <div class="task-text">${t.text}</div>
        <div class="task-meta">
          ${t.due?`<span class="task-date">${fmtDate(t.due)}</span>`:''}
          <span class="prio-tag ${t.prio==='high'?'high':t.prio==='med'?'med':''}">${t.prio.toUpperCase()}</span>
        </div>
      </div>
      <button class="task-del" onclick="delT('${t.id}')">✕</button>`;
    list.appendChild(item);
  });
}
function addTask(){
  const text=document.getElementById('taskText').value.trim();
  if(!text){toast('Task text required');return;}
  S.tasks.push({id:uid(),text,due:document.getElementById('taskDue').value,prio:S.prio||'med',done:false});
  document.getElementById('taskText').value='';
  document.getElementById('taskDue').value='';
  save(); renderTasks(); toast('Task added');
}
function toggleT(id){ const t=S.tasks.find(x=>x.id===id); if(t){t.done=!t.done;save();renderTasks();} }
function delT(id){ S.tasks=S.tasks.filter(x=>x.id!==id); save(); renderTasks(); }

// UTILS
function fmtDate(d){ if(!d)return''; return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
function toast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>el.remove(),2400);
}
document.getElementById('userModal').addEventListener('click',function(e){if(e.target===this)closeModal('userModal');});
document.getElementById('eventModal').addEventListener('click',function(e){if(e.target===this)closeModal('eventModal');});
document.getElementById('dealModal').addEventListener('click',function(e){if(e.target===this)closeModal('dealModal');});

load(); renderUsers(); renderDelegates(); renderEvents(); renderTasks();
</script>
</body>
</html>
